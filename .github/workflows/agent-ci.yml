name: Starter Pack CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pack-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Validate repository metadata
        run: python tools/validate_repo.py

      - name: Verify generated adapters
        run: python tools/build.py --check

      - name: Compile Python
        run: python -m compileall -q tools evals tests

      - name: Run unit tests
        run: |
          python -m unittest discover -s evals -p "test_*.py" -v
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run deterministic gate self-tests
        run: |
          python tools/land.py --self-test
          python tools/delegate.py --self-test
          python tools/local_tier_canary.py --self-test

      - name: Check shell wrapper and hook syntax
        run: |
          for file in .githooks/pre-commit tools/*.sh .claude/hooks/*.sh; do
            bash -n "$file"
          done
