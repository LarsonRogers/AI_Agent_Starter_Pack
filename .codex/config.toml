# .codex/config.toml — [PROJECT_NAME] project config
#
# Codex reads this automatically when you run `codex` from the repo root.
# See: https://developers.openai.com/codex/config-basic/
#
# NOTE: If Codex doesn't pick up this file, copy these settings to
# your user-level config at ~/.codex/config.toml instead.

# Ask before commands that need capabilities outside the sandbox. Projects may
# deliberately loosen this after recording the decision in AGENTS.md Part 2.
approval_policy = "on-request"

# Allow file writes within the workspace.
sandbox_mode = "workspace-write"

# Network is off in the default starter profile. Enable it per project only when
# external research or dependency access is required and the data boundary is known.
[sandbox_workspace_write]
network_access = false

# Fallback instruction filenames — checked ONLY in directories where
# AGENTS.md is absent. This pack ships AGENTS.md at the repo root, so the
# fallback never fires there: Codex reads AGENTS.md alone, NOT CLAUDE.md
# "in addition". This entry only lets subdirectories without their own
# AGENTS.md pick up a CLAUDE.md instead. Do not rely on it to feed CLAUDE.md
# content to Codex — anything both tools need belongs in AGENTS.md.
project_doc_fallback_filenames = ["CLAUDE.md"]
